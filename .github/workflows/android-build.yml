name: Android Build

on:
  workflow_dispatch:
    inputs:
      distribution:
        description: 'Build type'
        required: true
        default: 'aab'
        type: choice
        options:
          - aab
          - apk

jobs:
  build:
    name: Build Android (${{ github.event.inputs.distribution }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build AAB
        if: github.event.inputs.distribution == 'aab'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Build APK
        if: github.event.inputs.distribution == 'apk'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Upload AAB
        if: github.event.inputs.distribution == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: homelab-portal-aab-${{ github.run_number }}-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload APK
        if: github.event.inputs.distribution == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: homelab-portal-apk-${{ github.run_number }}-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
